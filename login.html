<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - Hương Trầm Việt</title>
    <link rel="icon" href="./img/logo0.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2 class="mb-0"> Hương Trầm Việt</h2>
                <p class="mb-0 mt-2">Chào mừng bạn trở lại</p>
            </div>
            
            <div class="auth-body">
                <!-- Login Form -->
                <form id="loginForm">
                    <h4 class="text-center mb-4 text-primary-custom">Đăng Nhập</h4>
                    
                    <div class="mb-3">
                        <label for="loginEmail" class="form-label">Email</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" class="form-control" id="loginEmail" 
                                   placeholder="email@example.com" required>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="loginPassword" class="form-label">Mật khẩu</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" id="loginPassword" 
                                   placeholder="Nhập mật khẩu" required>
                        </div>
                    </div>
                    
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="rememberMe">
                        <label class="form-check-label" for="rememberMe">
                            Ghi nhớ đăng nhập
                        </label>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 mb-3">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Đăng Nhập
                    </button>
                    
                    <div class="text-center">
                        <a href="#" class="text-decoration-none" onclick="showRegisterForm(); return false;">
                            Chưa có tài khoản? Đăng ký ngay
                        </a>
                    </div>
                    
                    <div class="text-center mt-3">
                        <a href="index.html" class="text-muted text-decoration-none">
                            <i class="bi bi-arrow-left me-2"></i>Quay lại trang chủ
                        </a>
                    </div>
                </form>
                
                <!-- Register Form (hidden by default) -->
                <form id="registerForm" style="display: none;">
                    <h4 class="text-center mb-4 text-primary-custom">Đăng Ký</h4>
                    
                    <div class="mb-3">
                        <label for="registerName" class="form-label">Họ và tên</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control" id="registerName" 
                                   placeholder="Nguyễn Văn A" required>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="registerEmail" class="form-label">Email</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" class="form-control" id="registerEmail" 
                                   placeholder="email@example.com" required>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="registerPhone" class="form-label">Số điện thoại</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                            <input type="tel" class="form-control" id="registerPhone" 
                                   placeholder="0901234567" required>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="registerPassword" class="form-label">Mật khẩu</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" id="registerPassword" 
                                   placeholder="Tối thiểu 6 ký tự" required>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="registerConfirmPassword" class="form-label">Xác nhận mật khẩu</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                            <input type="password" class="form-control" id="registerConfirmPassword" 
                                   placeholder="Nhập lại mật khẩu" required>
                        </div>
                    </div>
                    
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="agreeTerms" required>
                        <label class="form-check-label" for="agreeTerms">
                            Tôi đồng ý với <a href="#" class="text-decoration-none">Điều khoản sử dụng</a>
                        </label>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 mb-3">
                        <i class="bi bi-person-plus me-2"></i>Đăng Ký
                    </button>
                    
                    <div class="text-center">
                        <a href="#" class="text-decoration-none" onclick="showLoginForm(); return false;">
                            Đã có tài khoản? Đăng nhập
                        </a>
                    </div>
                    
                    <div class="text-center mt-3">
                        <a href="index.html" class="text-muted text-decoration-none">
                            <i class="bi bi-arrow-left me-2"></i>Quay lại trang chủ
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/common.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
